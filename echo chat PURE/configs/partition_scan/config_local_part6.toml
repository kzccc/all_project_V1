[mainConfig]
appName = "EchoChat"
host = "127.0.0.1"
port = 8081

[mysqlConfig]
host = "127.0.0.1"
port = 3306
user = "root"
password = ""
databaseName = "echochat"
maxOpenConns = 500
maxIdleConns = 100
connMaxLifetimeMinutes = 30
connMaxIdleTimeMinutes = 10

[redisConfig]
host = "127.0.0.1"
port = 6379
password = ""
db = 0

[authCodeConfig]
accessKeyID = ""
accessKeySecret = ""
signName = "阿里云短信测试"
templateCode = "SMS_154950909"

[logConfig]
logPath = "./logs/echochat.log"
level = "info"
disableStdout = true

[jwtConfig]
accessExpireMinutes = 60
refreshExpireHours = 168
issuer = "EchoChat"
subject = "user-auth"
key = "58c89e18c2a896b83557f336adcfdbc1189818de23ad564615e3cd0dffc25d37"

[kafkaConfig]
messageMode = "channel"
hostPort = "127.0.0.1:9092"
loginTopic = "login"
chatTopic = "chat_message_part6"
logoutTopic = "logout"
messageKey = "chat"
topicPartitions = 6
partition = 1
timeout = 1
producerRetryMax = 3
producerRetryBackoffMs = 200
minInsyncReplicas = 1
consumerCommitBatchSize = 100
consumerCommitIntervalMs = 250
mysqlPersistBatchSize = 64
mysqlPersistFlushIntervalMs = 1
mysqlPersistWorkerCount = 8

[staticSrcConfig]
staticAvatarPath = "./static/avatars"
staticFilePath = "./static/files"

[pressureTestConfig]
enableBenchmarkRoutes = true
disableBenchmarkRequestLog = true
disableBenchmarkHotPathLog = true

[observabilityConfig]
enablePprof = true
enableMetrics = true
