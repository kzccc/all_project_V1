[run]
base_config = "configs/config_local.toml"
record_root = "pressure testing/record"
report_layout = "bundle"
base_url = "http://127.0.0.1:19082"
ws_base_url = "ws://127.0.0.1:19082"
bench_admin_base_url = "http://127.0.0.1:19082"
fixture_path = ""
seed_prefix = "PTR433"
database = "echochat_recovery433"
default_password = "123456"

[mainconfig]
target_rate = 10000
session_count = 300
topic_partitions = 10
partition_async_shard_count = 20
mysql_persist_worker_count = 1
mysql_persist_batch_size = 100

[scenario]
session_count = 300
fixture_pair_count = 4800
user_count = 1600
target_rate = 10000
duration_sec = 20
partition_selection_mode = "balanced"
session_partition_balance_mode = "on"
worker_balance_mode = "off"

[consumers]
count = 1
base_port = 19082

[kafka]
broker_count = 1
host_port = "127.0.0.1:9092"
chat_topic_prefix = "chat_pressure"
unique_topic_per_run = true
topic_partitions = 10

[mysql]
host = "127.0.0.1"
port = 33306
database_name = "echochat_recovery433"

[redis]
host = "127.0.0.1"
port = 6379
db = 0

[commit]
batch_size = 400
interval_ms = 250

[persist]
batch_size = 100
first_job_hold_ms = 0.5
flush_interval_ms = 7
worker_count = 1
queue_size = 4096
session_seq_redis_only_experimental = false
mysql_persist_noop_experimental = false

[partition_async]
enabled = false
shard_count = 20
queue_size = 512
drain_timeout_ms = 3000

[conversation_bucket]
enabled = true
worker_count = 20
ready_queue_size = 1024
bucket_queue_size = 1024
max_messages_per_turn = 1
max_run_duration_ms = 1
drain_timeout_ms = 3000

[benchmark]
message_timeout_ms = 60000
connection_settle_ms = 1500
setup_workers = 16
setup_http_timeout_ms = 90000
ws_open_timeout_ms = 30000
drain_wait_ms = 5000
drain_idle_ms = 1000
post_run_settle_ms = 1000
ws_path = "/bench/wss"
seed_reset_prefix = false

[logging]
level = "info"
disable_stdout = false
disable_benchmark_request_log = true
disable_benchmark_hot_path_log = true

[cleanup]
delete_current_redis_pressure_keys = true
