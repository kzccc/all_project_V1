[run]
label = "batch_persist_benchmark"
record_root = "pressure workable/批量持久化的性能测试/record"
report_root = "pressure workable/批量持久化的性能测试/reports"
runner_script = "pressure testing/scripts/run_single_chat_pressure.py"
base_pressure_config = "pressure testing/configs/single_chat_pressure.toml"

[baseline]
name = "single_insert"
mysql_persist_batch_size = 1
mysql_persist_flush_interval_ms = 1
mysql_persist_first_job_hold_ms = 0
mysql_persist_worker_count = 1
label_suffix = "single_insert"

[candidate]
name = "batched"
mysql_persist_batch_size = 100
mysql_persist_flush_interval_ms = 7
mysql_persist_first_job_hold_ms = 0.5
mysql_persist_worker_count = 1
label_suffix = "batched"

[shared]
seed_prefix = "BATCHCMP1"
base_config = "configs/config_local_singlebroker_part240_mysqlpersist_tune2.toml"
mysql_runtime_root = "./runtime/mysql_isolated"
database = "echochat_pressure_batch_persist"
session_count = 100
fixture_pair_count = 1200
user_count = 400
topic_partitions = 10
target_rate = 3000
duration_sec = 20
conversation_bucket_enabled = true
conversation_bucket_worker_count = 20
conversation_bucket_ready_queue_size = 1024
conversation_bucket_bucket_queue_size = 1024
conversation_bucket_max_messages_per_turn = 1
conversation_bucket_max_run_duration_ms = 1
mysql_persist_queue_size = 4096
consumer_count = 1
consumer_base_port = 18082
kafka_host_port = "127.0.0.1:9092"
redis_host = "127.0.0.1"
redis_port = 6379
mysql_host = "127.0.0.1"
mysql_port = 33306
delete_mysql_runtime_dir = true

[[stages]]
name = "stage_1500"
target_rate = 1500
duration_sec = 20

[[stages]]
name = "stage_3000"
target_rate = 3000
duration_sec = 20

[[stages]]
name = "stage_4500"
target_rate = 4500
duration_sec = 20
