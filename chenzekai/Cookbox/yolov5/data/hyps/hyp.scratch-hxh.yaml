# Hyperparameters for medium-augmentation COCO training from scratch
# python train.py --batch 32 --cfg yolov5m6.yaml --weights '' --data coco.yaml --img 1280 --epochs 300
# See tutorials for hyperparameter evolution https://github.com/ultralytics/yolov5#tutorials

lr0: 0.01  # initial learning rate (SGD=1E-2, Adam=1E-3)
lrf: 0.005  # final OneCycleLR learning rate (lr0 * lrf)
momentum: 0.937  # SGD momentum/Adam beta1
weight_decay: 0.0005  # optimizer weight decay 5e-4
warmup_epochs: 3.0  # warmup epochs (fractions ok)
warmup_momentum: 0.8  # warmup initial momentum
warmup_bias_lr: 0.1  # warmup initial bias lr
box: 0.04  # box loss gain, default 0.05
cls: 0.5  # cls loss gain, dafault 0.3
cls_pw: 1  # cls BCELoss positive_weight
obj: 0.7  # obj loss gain (scale with pixels), default 0.7
obj_pw: 1  # obj BCELoss positive_weight, default 1.0
iou_t: 0.30  # IoU training threshold, default 0.2
anchor_t: 4.0  # anchor-multiple threshold
# anchors: 3  # anchors per output layer (0 to ignore)
fl_gamma: 0.0  # focal loss gamma (efficientDet default gamma=1.5), default 0.0
hsv_h: 0.04  # image HSV-Hue augmentation (fraction), default 0.025
hsv_s: 0.4  # image HSV-Saturation augmentation (fraction),default 0.7
hsv_v: 0.4  # image HSV-Value augmentation (fraction),default 0.4
degrees: 30.0  # image rotation (+/- deg)
translate: 0  # image translation (+/- fraction)
scale: 0.25  # image scale (+/- gain)
shear: 10.0  # image shear (+/- deg),default 0
perspective: 0.001  # image perspective (+/- fraction), range 0-0.001
flipud: 0.0  # image flip up-down (probability)
fliplr: 0.3  # image flip left-right (probability)
mosaic: 1.0  # image mosaic (probability),default 1.0
mixup: 0.1  # image mixup (probability)
copy_paste: 0.0  # segment copy-paste (probability)
